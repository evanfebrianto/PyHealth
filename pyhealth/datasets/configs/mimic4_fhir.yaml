# MIMIC-IV FHIR uses a flattened intermediate representation:
# NDJSON/NDJSON.GZ resources are normalized into per-resource parquet tables under
# the dataset cache, then loaded through the standard BaseDataset YAML flow below.
version: "fhir_r4_flattened"

# PhysioNet layout (credentialled export): a single ``fhir/`` directory containing
# gzip NDJSON shards such as ``MimicPatient.ndjson.gz`` and
# ``MimicObservationLabevents.ndjson.gz``.
glob_pattern: "**/*.ndjson.gz"

tables:
  patient:
    file_path: "patient.parquet"
    patient_id: "patient_id"
    timestamp: "birth_date"
    attributes:
      - "patient_fhir_id"
      - "birth_date"
      - "gender"
      - "deceased_boolean"
      - "deceased_datetime"

  encounter:
    file_path: "encounter.parquet"
    patient_id: "patient_id"
    timestamp: "event_time"
    attributes:
      - "resource_id"
      - "encounter_id"
      - "event_time"
      - "encounter_class"
      - "encounter_end"

  condition:
    file_path: "condition.parquet"
    patient_id: "patient_id"
    timestamp: "event_time"
    attributes:
      - "resource_id"
      - "encounter_id"
      - "event_time"
      - "concept_key"

  observation:
    file_path: "observation.parquet"
    patient_id: "patient_id"
    timestamp: "event_time"
    attributes:
      - "resource_id"
      - "encounter_id"
      - "event_time"
      - "concept_key"

  medication_request:
    file_path: "medication_request.parquet"
    patient_id: "patient_id"
    timestamp: "event_time"
    attributes:
      - "resource_id"
      - "encounter_id"
      - "event_time"
      - "concept_key"

  procedure:
    file_path: "procedure.parquet"
    patient_id: "patient_id"
    timestamp: "event_time"
    attributes:
      - "resource_id"
      - "encounter_id"
      - "event_time"
      - "concept_key"
